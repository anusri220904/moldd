<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Moldd</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="loaded">
    
    <header>
        <div class="header-content">
            <h1>Moldd</h1>
            <a href="index.html" class="back-link">&larr; BACK TO COLLECTIONS</a>
        </div>
    </header>

    <main class="shop-container">
        <div class="products-grid">
            </div>
    </main>

    <section class="cart-section">
        <div id="cartPreview">
            <h2>Your Selection</h2>
            <ul id="cartItems">
                </ul>
            <div class="order-summary">
                <p>Subtotal: ₹<span id="cartSubtotal">0.00</span></p>
                <p>Delivery Charge: ₹100.00</p>
                <p><strong id="cartTotal">Total: ₹0.00</strong></p>
            </div>
        </div>
        
        <div class="checkout-area">
            <a id="whatsappLink" class="cart-btn" href="#" target="_blank">Order via WhatsApp</a>
            <button id="clearCartBtn" class="secondary-btn">Clear Cart</button>
        </div>
    </section>

    <footer class="footer">
        <p>&copy; 2026 Moldd. Owned by Naveen Srivastav.</p>
        <p>Follow us on Instagram: <a href="https://www.instagram.com/moldd.in" target="_blank">@moldd.in</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
